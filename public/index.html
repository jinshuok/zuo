<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>zuocuo - 不怕做错</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .grids-section { padding: 48px 24px 64px; }
    .grids-container { max-width: 1320px; margin: 0 auto; }
    .grids-title {
      font-size: 24px;
      font-weight: 600;
      color: #181E25;
      margin-bottom: 32px;
      text-align: center;
    }
    .grids-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }
    @media (max-width: 768px) {
      .grids-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
      .grids-section { padding: 32px 16px 48px; }
    }
    .grid-item {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .grid-item:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.12);
    }
    .grid-item img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
    }
    .grid-item .grid-title {
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 500;
      color: #181E25;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .grids-loading {
      text-align: center;
      color: #86909C;
      padding: 40px;
    }

    /* ========== 轮盘轮播图样式 ========== */
    .wheel-slide .slide-content {
      position: relative;
      overflow: hidden;
    }
    .wheel-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
    }
    .wheel-container {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 100%;
      overflow: hidden;
      user-select: none;
    }
    .wheel-viewport {
      position: relative;
      width: 100%;
      height: 100%;
      perspective: 1200px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    .wheel-track {
      position: relative;
      width: 0;
      height: 0;
      transform-style: preserve-3d;
      margin-bottom: 14%;
    }
    .wheel-card {
      position: absolute;
      width: 170px;
      height: 220px;
      left: 50%;
      bottom: 0;
      margin-left: -85px;
      border-radius: 16px;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      transition: all 0.55s cubic-bezier(0.34, 1.56, 0.64, 1);
      cursor: pointer;
      will-change: transform;
      transform-origin: bottom center;
    }
    .wheel-card .card-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }
    .wheel-card .card-link {
      display: block;
      width: 100%;
      height: 100%;
      text-decoration: none;
    }
    .wheel-card .card-btn {
      position: absolute;
      bottom: -42px;
      left: 50%;
      transform: translateX(-50%);
      padding: 6px 18px;
      background: #fff;
      color: #181E25;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      white-space: nowrap;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }
    .wheel-card.pos-0 {
      transform: translateX(0) translateY(-45px) rotate(0deg);
      z-index: 10;
      box-shadow: 0 18px 55px rgba(0,0,0,0.3);
    }
    .wheel-card.pos-0::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 16px;
      border: 3px solid #fff;
      pointer-events: none;
      transition: border-color 0.3s;
    }
    .wheel-card.pos-0:hover::after {
      border-color: #e5e7eb;
    }
    .wheel-card.pos-0 .card-btn {
      opacity: 1;
      pointer-events: auto;
    }
    .wheel-card.pos--1 {
      transform: translateX(-185px) translateY(10px) rotate(-16deg);
      z-index: 5;
    }
    .wheel-card.pos--1 .card-btn {
      opacity: 1;
      pointer-events: auto;
    }
    .wheel-card.pos-1 {
      transform: translateX(185px) translateY(10px) rotate(16deg);
      z-index: 5;
    }
    .wheel-card.pos-1 .card-btn {
      opacity: 1;
      pointer-events: auto;
    }
    .wheel-card.pos--2 {
      transform: translateX(-340px) translateY(65px) rotate(-30deg);
      z-index: 2;
    }
    .wheel-card.pos-2 {
      transform: translateX(340px) translateY(65px) rotate(30deg);
      z-index: 2;
    }
    .wheel-arc {
      position: absolute;
      bottom: 4%;
      left: 50%;
      transform: translateX(-50%);
      width: 68%;
      height: 50%;
      border-bottom: 2px solid rgba(255,255,255,0.16);
      border-radius: 50%;
      pointer-events: none;
      z-index: 1;
    }
    .wheel-hint {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      pointer-events: none;
      z-index: 20;
    }
    @media (max-width: 768px) {
      .wheel-card {
        width: 120px;
        height: 160px;
        margin-left: -60px;
      }
      .wheel-card.pos-0 {
        transform: translateX(0) translateY(-35px) rotate(0deg);
      }
      .wheel-card.pos--1 {
        transform: translateX(-130px) translateY(8px) rotate(-16deg);
      }
      .wheel-card.pos-1 {
        transform: translateX(130px) translateY(8px) rotate(16deg);
      }
      .wheel-card.pos--2 {
        transform: translateX(-240px) translateY(50px) rotate(-30deg);
      }
      .wheel-card.pos-2 {
        transform: translateX(240px) translateY(50px) rotate(30deg);
      }
      .wheel-container {
        height: 76%;
      }
    }
  </style>
</head>
<body>
  <!-- 顶部导航 -->
  <header class="site-header">
    <div class="nav-inner">
      <a href="/" class="logo">zuocuo</a>
      <span class="tagline">不怕做错</span>
    </div>
  </header>

  <!-- 主内容 -->
  <main>
    <section class="hero-section">
      <div class="hero-container">
        <div class="swiper hero-swiper">
          <div class="swiper-wrapper" id="bannerWrapper">
            <div class="swiper-slide">
              <div class="banner-loading">加载中...</div>
            </div>
          </div>
          <div class="swiper-pagination"></div>
          <div class="swiper-button-prev"></div>
          <div class="swiper-button-next"></div>
        </div>
      </div>
    </section>

    <section class="grids-section">
      <div class="grids-container">
        <div class="grids-grid" id="gridsWrapper">
          <div class="grids-loading">加载中...</div>
        </div>
      </div>
    </section>
  </main>

  <!-- 页脚 -->
  <footer class="site-footer">
    <div class="footer-inner">
      <span class="copyright">© 2024 zuocuo. 通过kimi agent更新. All rights reserved.</span>
      <a href="/admin.html" class="admin-link">管理入口</a>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script>
    let swiperInstance = null;
    const wheelInstances = [];

    async function loadBanners() {
      try {
        const res = await fetch('/api/banners/list');
        const data = await res.json();
        const banners = data.banners || [];
        const wrapper = document.getElementById('bannerWrapper');

        if (banners.length === 0) {
          wrapper.innerHTML = `
            <div class="swiper-slide">
              <div class="slide-content">
                <div class="slide-text">
                  <h1 class="slide-title"><span class="brand">zuocuo</span></h1>
                  <p class="slide-subtitle">不怕做错，勇敢尝试</p>
                  <div class="slide-buttons">
                    <a href="/admin.html" class="btn btn-primary">开始管理</a>
                  </div>
                </div>
                <div class="slide-media" style="background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);"></div>
              </div>
            </div>
          `;
        } else {
          wrapper.innerHTML = banners.map((b, idx) => {
            if (b.type === 'wheel') {
              return renderWheelSlide(b, idx);
            }
            return `
            <div class="swiper-slide">
              <div class="slide-content">
                <div class="slide-text">
                  <h1 class="slide-title">${escapeHtml(b.title)}</h1>
                  ${b.subtitle ? `<p class="slide-subtitle">${escapeHtml(b.subtitle)}</p>` : ''}
                  <div class="slide-buttons">
                    ${b.btn_link ? `<a href="${escapeHtml(b.btn_link)}" class="btn btn-primary">${escapeHtml(b.btn_text || '了解更多')}</a>` : ''}
                    ${b.link_url ? `<a href="${escapeHtml(b.link_url)}" class="btn btn-secondary">查看详情</a>` : ''}
                  </div>
                </div>
                <div class="slide-media">
                  <img src="${escapeHtml(b.image_url)}" alt="${escapeHtml(b.title)}" loading="lazy">
                </div>
              </div>
            </div>
          `;
          }).join('');
        }

        if (swiperInstance) swiperInstance.destroy(true, true);

        swiperInstance = new Swiper('.hero-swiper', {
          slidesPerView: 1,
          spaceBetween: 0,
          loop: banners.length > 1,
          autoplay: banners.length > 1 ? {
            delay: 5000,
            disableOnInteraction: false,
          } : false,
          pagination: {
            el: '.swiper-pagination',
            clickable: true,
          },
          navigation: {
            nextEl: '.swiper-button-next',
            prevEl: '.swiper-button-prev',
          },
          effect: 'fade',
          fadeEffect: {
            crossFade: true
          },
        });

        // 初始化所有轮盘组件
        wheelInstances.forEach(w => w.destroy && w.destroy());
        wheelInstances.length = 0;
        document.querySelectorAll('.wheel-container[data-wheel]').forEach(container => {
          const idx = parseInt(container.dataset.wheel, 10);
          const banner = banners[idx];
          if (banner && banner.items && banner.items.length > 0) {
            wheelInstances.push(new WheelCarousel(container, banner.items));
          }
        });

        // Swiper 切换时重新计算当前轮盘位置
        swiperInstance.on('slideChange', () => {
          const activeSlide = document.querySelector('.swiper-slide-active .wheel-container');
          if (activeSlide) {
            const inst = wheelInstances.find(w => w.container === activeSlide);
            if (inst) {
              requestAnimationFrame(() => inst.updateCards());
            }
          }
        });

        // 鼠标悬停轮盘时暂停 Swiper 自动播放
        document.querySelectorAll('.wheel-slide').forEach(slide => {
          slide.addEventListener('mouseenter', () => {
            if (swiperInstance.autoplay) swiperInstance.autoplay.stop();
          });
          slide.addEventListener('mouseleave', () => {
            if (swiperInstance.autoplay) swiperInstance.autoplay.start();
          });
        });
      } catch (err) {
        console.error('加载轮播图失败:', err);
        document.getElementById('bannerWrapper').innerHTML = `
          <div class="swiper-slide">
            <div class="banner-loading">加载失败，请刷新重试</div>
          </div>
        `;
      }
    }

    function renderWheelSlide(b, idx) {
      return `
        <div class="swiper-slide wheel-slide">
          <div class="slide-content">
            <div class="wheel-container" data-wheel="${idx}">
              <div class="wheel-viewport">
                <div class="wheel-arc"></div>
                <div class="wheel-track">
                  <div class="wheel-card" data-pos="-2"><a class="card-link" href="#" draggable="false"><img class="card-img" src="" alt="" draggable="false" loading="lazy"></a><a class="card-btn" href="#" target="_blank"></a></div>
                  <div class="wheel-card" data-pos="-1"><a class="card-link" href="#" draggable="false"><img class="card-img" src="" alt="" draggable="false" loading="lazy"></a><a class="card-btn" href="#" target="_blank"></a></div>
                  <div class="wheel-card" data-pos="0"><a class="card-link" href="#" draggable="false"><img class="card-img" src="" alt="" draggable="false" loading="lazy"></a><a class="card-btn" href="#" target="_blank"></a></div>
                  <div class="wheel-card" data-pos="1"><a class="card-link" href="#" draggable="false"><img class="card-img" src="" alt="" draggable="false" loading="lazy"></a><a class="card-btn" href="#" target="_blank"></a></div>
                  <div class="wheel-card" data-pos="2"><a class="card-link" href="#" draggable="false"><img class="card-img" src="" alt="" draggable="false" loading="lazy"></a><a class="card-btn" href="#" target="_blank"></a></div>
                </div>
              </div>
              <div class="wheel-hint">滚动鼠标旋转轮盘 · 点击两侧切换</div>
            </div>
          </div>
        </div>
      `;
    }

    class WheelCarousel {
      constructor(container, items) {
        this.container = container;
        this.items = items;
        this.activeIndex = 0;
        this.cardEls = Array.from(container.querySelectorAll('.wheel-card'));
        this.isDragging = false;
        this.startX = 0;
        this.startY = 0;
        this.dragThreshold = 50;
        this._resizeHandler = () => this.updateCards();
        this.init();
      }

      init() {
        window.addEventListener('resize', this._resizeHandler);
        this.updateCards();
        this.bindEvents();
      }

      getItemIndex(offset) {
        const count = this.items.length;
        if (count === 0) return 0;
        let idx = (this.activeIndex + offset) % count;
        if (idx < 0) idx += count;
        return idx;
      }

      updateCards() {
        const count = this.items.length;
        if (count === 0) return;

        this.cardEls.forEach((card) => {
          const offset = parseInt(card.dataset.pos, 10);
          const itemIdx = this.getItemIndex(offset);
          const item = this.items[itemIdx];

          const img = card.querySelector('.card-img');
          const imgLink = card.querySelector('.card-link');
          const btn = card.querySelector('.card-btn');

          if (img && item && item.image_url) {
            img.src = item.image_url;
            img.style.display = 'block';
          } else if (img) {
            img.style.display = 'none';
          }

          if (imgLink && item) {
            imgLink.href = item.link_url || '#';
          }

          if (btn) {
            if (item && item.btn_text) {
              btn.textContent = item.btn_text;
              btn.href = item.btn_link || item.link_url || '#';
              btn.style.display = 'block';
            } else {
              btn.style.display = 'none';
            }
          }

          // 更新位置类名
          card.className = 'wheel-card';
          card.classList.add(`pos-${offset}`);

          // 点击事件：中间跳转，两侧切换到中心
          card.onclick = (e) => {
            if (offset === 0) {
              if (!item || (!item.link_url && !item.btn_link) || (item.link_url === '#' && item.btn_link === '#')) {
                e.preventDefault();
              }
            } else {
              e.preventDefault();
              e.stopPropagation();
              this.activeIndex = itemIdx;
              this.updateCards();
            }
          };
        });
      }

      next() {
        const count = this.items.length;
        if (count === 0) return;
        this.activeIndex = (this.activeIndex + 1) % count;
        this.updateCards();
      }

      prev() {
        const count = this.items.length;
        if (count === 0) return;
        this.activeIndex = (this.activeIndex - 1 + count) % count;
        this.updateCards();
      }

      bindEvents() {
        // 鼠标滚轮
        this.container.addEventListener('wheel', (e) => {
          e.preventDefault();
          e.stopPropagation();
          if (e.deltaY > 0) this.next();
          else this.prev();
        }, { passive: false });

        // 触摸拖拽
        this.container.addEventListener('touchstart', (e) => {
          this.isDragging = true;
          this.startX = e.touches[0].clientX;
          this.startY = e.touches[0].clientY;
        }, { passive: true });

        this.container.addEventListener('touchmove', (e) => {
          if (!this.isDragging) return;
          e.preventDefault();
        }, { passive: false });

        this.container.addEventListener('touchend', (e) => {
          if (!this.isDragging) return;
          this.isDragging = false;
          const dx = e.changedTouches[0].clientX - this.startX;
          const dy = e.changedTouches[0].clientY - this.startY;
          if (Math.abs(dx) > Math.abs(dy)) {
            if (dx < -this.dragThreshold) this.next();
            else if (dx > this.dragThreshold) this.prev();
          } else {
            if (dy < -this.dragThreshold) this.next();
            else if (dy > this.dragThreshold) this.prev();
          }
        });

        // 鼠标拖拽
        this.container.addEventListener('mousedown', (e) => {
          this.isDragging = true;
          this.startX = e.clientX;
          this.startY = e.clientY;
          this.container.style.cursor = 'grabbing';
        });

        const onMouseUp = (e) => {
          if (!this.isDragging) return;
          this.isDragging = false;
          this.container.style.cursor = 'default';
          const dx = e.clientX - this.startX;
          const dy = e.clientY - this.startY;
          if (Math.abs(dx) > Math.abs(dy)) {
            if (dx < -this.dragThreshold) this.next();
            else if (dx > this.dragThreshold) this.prev();
          } else {
            if (dy < -this.dragThreshold) this.next();
            else if (dy > this.dragThreshold) this.prev();
          }
        };

        window.addEventListener('mouseup', onMouseUp);
      }

      destroy() {
        window.removeEventListener('resize', this._resizeHandler);
      }
    }

    async function loadGrids() {
      try {
        const res = await fetch('/api/grids/list');
        const data = await res.json();
        const grids = data.grids || [];
        const wrapper = document.getElementById('gridsWrapper');

        if (grids.length === 0) {
          wrapper.innerHTML = '';
          return;
        }

        wrapper.innerHTML = grids.map(g => `
          <a href="${escapeHtml(g.link_url || '#')}" class="grid-item" title="${escapeHtml(g.title)}">
            <img src="${escapeHtml(g.image_url)}" alt="${escapeHtml(g.title)}" loading="lazy">
            <div class="grid-title">${escapeHtml(g.title)}</div>
          </a>
        `).join('');
      } catch (err) {
        console.error('加载九宫格失败:', err);
        document.getElementById('gridsWrapper').innerHTML = '';
      }
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    loadBanners();
    loadGrids();
  </script>
</body>
</html>
