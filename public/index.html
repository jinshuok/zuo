<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>zuocuo - 不怕做错</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .grids-section { padding: 48px 24px 64px; }
    .grids-container { max-width: 1320px; margin: 0 auto; }
    .grids-title {
      font-size: 24px;
      font-weight: 600;
      color: #181E25;
      margin-bottom: 32px;
      text-align: center;
    }
    .grids-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }
    @media (max-width: 768px) {
      .grids-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
      .grids-section { padding: 32px 16px 48px; }
    }
    .grid-item {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .grid-item:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.12);
    }
    .grid-item img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
    }
    .grid-item .grid-title {
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 500;
      color: #181E25;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .grids-loading {
      text-align: center;
      color: #86909C;
      padding: 40px;
    }
  </style>
</head>
<body>
  <!-- 顶部导航 -->
  <header class="site-header">
    <div class="nav-inner">
      <a href="/" class="logo">zuocuo</a>
      <span class="tagline">不怕做错</span>
    </div>
  </header>

  <!-- 主内容 -->
  <main>
    <section class="hero-section">
      <div class="hero-container">
        <div class="swiper hero-swiper">
          <div class="swiper-wrapper" id="bannerWrapper">
            <div class="swiper-slide">
              <div class="banner-loading">加载中...</div>
            </div>
          </div>
          <div class="swiper-pagination"></div>
          <div class="swiper-button-prev"></div>
          <div class="swiper-button-next"></div>
        </div>
      </div>
    </section>

    <section class="grids-section">
      <div class="grids-container">
        <div class="grids-grid" id="gridsWrapper">
          <div class="grids-loading">加载中...</div>
        </div>
      </div>
    </section>
  </main>

  <!-- 页脚 -->
  <footer class="site-footer">
    <div class="footer-inner">
      <span class="copyright">© 2024 zuocuo. All rights reserved.</span>
      <a href="/admin.html" class="admin-link">管理入口</a>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  <script>
    let swiperInstance = null;

    async function loadBanners() {
      try {
        const res = await fetch('/api/banners/list');
        const data = await res.json();
        const banners = data.banners || [];
        const wrapper = document.getElementById('bannerWrapper');

        if (banners.length === 0) {
          wrapper.innerHTML = `
            <div class="swiper-slide">
              <div class="slide-content">
                <div class="slide-text">
                  <h1 class="slide-title"><span class="brand">zuocuo</span></h1>
                  <p class="slide-subtitle">不怕做错，勇敢尝试</p>
                  <div class="slide-buttons">
                    <a href="/admin.html" class="btn btn-primary">开始管理</a>
                  </div>
                </div>
                <div class="slide-media" style="background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);"></div>
              </div>
            </div>
          `;
        } else {
          wrapper.innerHTML = banners.map(b => `
            <div class="swiper-slide">
              <div class="slide-content">
                <div class="slide-text">
                  <h1 class="slide-title">${escapeHtml(b.title)}</h1>
                  ${b.subtitle ? `<p class="slide-subtitle">${escapeHtml(b.subtitle)}</p>` : ''}
                  <div class="slide-buttons">
                    ${b.btn_link ? `<a href="${escapeHtml(b.btn_link)}" class="btn btn-primary">${escapeHtml(b.btn_text || '了解更多')}</a>` : ''}
                    ${b.link_url ? `<a href="${escapeHtml(b.link_url)}" class="btn btn-secondary">查看详情</a>` : ''}
                  </div>
                </div>
                <div class="slide-media">
                  <img src="${escapeHtml(b.image_url)}" alt="${escapeHtml(b.title)}" loading="lazy">
                </div>
              </div>
            </div>
          `).join('');
        }

        if (swiperInstance) swiperInstance.destroy(true, true);

        swiperInstance = new Swiper('.hero-swiper', {
          slidesPerView: 1,
          spaceBetween: 0,
          loop: banners.length > 1,
          autoplay: banners.length > 1 ? {
            delay: 5000,
            disableOnInteraction: false,
          } : false,
          pagination: {
            el: '.swiper-pagination',
            clickable: true,
          },
          navigation: {
            nextEl: '.swiper-button-next',
            prevEl: '.swiper-button-prev',
          },
          effect: 'fade',
          fadeEffect: {
            crossFade: true
          },
        });
      } catch (err) {
        console.error('加载轮播图失败:', err);
        document.getElementById('bannerWrapper').innerHTML = `
          <div class="swiper-slide">
            <div class="banner-loading">加载失败，请刷新重试</div>
          </div>
        `;
      }
    }

    async function loadGrids() {
      try {
        const res = await fetch('/api/grids/list');
        const data = await res.json();
        const grids = data.grids || [];
        const wrapper = document.getElementById('gridsWrapper');

        if (grids.length === 0) {
          wrapper.innerHTML = '';
          return;
        }

        wrapper.innerHTML = grids.map(g => `
          <a href="${escapeHtml(g.link_url || '#')}" class="grid-item" title="${escapeHtml(g.title)}">
            <img src="${escapeHtml(g.image_url)}" alt="${escapeHtml(g.title)}" loading="lazy">
            <div class="grid-title">${escapeHtml(g.title)}</div>
          </a>
        `).join('');
      } catch (err) {
        console.error('加载九宫格失败:', err);
        document.getElementById('gridsWrapper').innerHTML = '';
      }
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    loadBanners();
    loadGrids();
  </script>
</body>
</html>
